<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transportista Agent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #0d1115;
        color: #f5f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.16), transparent 34%),
          #0d1115;
      }

      main {
        padding: 18px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 4px;
      }

      p {
        color: #a3a3a3;
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }

      form {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 7px;
        background: #10161c;
        color: #f5f5f5;
        font-size: 14px;
        height: 38px;
        padding: 0 11px;
        outline: none;
      }

      input:focus {
        border-color: rgba(20, 184, 166, 0.75);
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.035);
        padding: 14px;
      }

      .status {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-top: 14px;
      }

      .badge {
        border-radius: 999px;
        background: rgba(115, 115, 115, 0.16);
        color: #d4d4d4;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
      }

      .badge.running {
        background: rgba(20, 184, 166, 0.14);
        color: #5eead4;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        border: 0;
        border-radius: 7px;
        background: #f5f5f5;
        color: #111;
        cursor: pointer;
        font-weight: 700;
        height: 38px;
        padding: 0 13px;
      }

      button.secondary {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #10161c;
        color: #f5f5f5;
      }

      button.danger {
        background: #7f1d1d;
        color: #fff;
      }

      #log {
        display: grid;
        gap: 7px;
        margin-top: 14px;
        max-height: 110px;
        overflow: auto;
      }

      .log-line {
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.2);
        color: #d4d4d4;
        font-size: 12px;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Transportista Agent</h1>
        <p>Lee el chatlog de SAMP y envia llamadas validas a tu grupo.</p>
      </header>

      <div class="status">
        <span id="state" class="badge">Parado</span>
        <p id="path">Buscando chatlog...</p>
      </div>

      <form id="config-form" class="panel">
        <label>
          Nombre del equipo
          <input id="agentName" autocomplete="off" />
        </label>
        <label>
          ID del grupo
          <input id="groupId" autocomplete="off" />
        </label>
        <label>
          Email
          <input id="email" autocomplete="email" />
        </label>
        <label>
          Password
          <input id="password" autocomplete="current-password" type="password" />
        </label>
        <div class="row">
          <label>
            Chatlog
            <input id="chatlogPath" placeholder="Automatico si lo dejas vacio" />
          </label>
          <button id="pick-chatlog" class="secondary" type="button">Buscar</button>
        </div>
        <details>
          <summary>Avanzado</summary>
          <label>
            Firebase API key
            <input id="apiKey" autocomplete="off" />
          </label>
          <label>
            Firebase Database URL
            <input id="databaseURL" autocomplete="off" />
          </label>
        </details>
        <div class="actions">
          <button type="submit">Guardar</button>
          <button id="start" type="button">Iniciar</button>
          <button id="stop" class="danger" type="button">Parar</button>
        </div>
      </form>

      <section id="log"></section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
