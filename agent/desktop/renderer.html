<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transportista Agent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
        background: #0d1115;
        color: #f5f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.15), transparent 32%),
          linear-gradient(180deg, #0d1115, #0a0d10);
      }

      main {
        display: grid;
        gap: 16px;
        padding: 22px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        font-size: 22px;
        margin: 0 0 4px;
      }

      h2 {
        font-size: 16px;
        margin: 0;
      }

      p {
        color: #a3a3a3;
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }

      form,
      .stack {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 7px;
        background: #10161c;
        color: #f5f5f5;
        font-size: 14px;
        height: 38px;
        padding: 0 11px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: rgba(20, 184, 166, 0.75);
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        padding: 16px;
      }

      .hidden {
        display: none !important;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .account {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .account strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        border-radius: 999px;
        background: rgba(115, 115, 115, 0.16);
        color: #d4d4d4;
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
      }

      .badge.running {
        background: rgba(20, 184, 166, 0.14);
        color: #5eead4;
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
      }

      .actions {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      button {
        border: 0;
        border-radius: 7px;
        background: #f5f5f5;
        color: #111;
        cursor: pointer;
        font-weight: 700;
        height: 38px;
        padding: 0 13px;
      }

      button.secondary {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #10161c;
        color: #f5f5f5;
      }

      button.danger {
        background: #7f1d1d;
        color: #fff;
      }

      button.ghost {
        background: transparent;
        color: #d4d4d4;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .path {
        overflow-wrap: anywhere;
      }

      .error {
        border-radius: 7px;
        background: rgba(127, 29, 29, 0.22);
        color: #fecaca;
        font-size: 12px;
        line-height: 1.35;
        padding: 9px;
      }

      #log {
        display: grid;
        gap: 7px;
        max-height: 116px;
        overflow: auto;
      }

      .log-line {
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.22);
        color: #d4d4d4;
        font-size: 12px;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Transportista Agent</h1>
          <p>Lee el chatlog de SAMP y envia llamadas validas a tu grupo.</p>
        </div>
        <span id="state" class="badge">Parado</span>
      </header>

      <section id="login-view" class="panel">
        <form id="login-form">
          <div>
            <h2>Iniciar sesion</h2>
            <p>Usa la misma cuenta que en la web.</p>
          </div>
          <label>
            Email
            <input id="email" autocomplete="email" />
          </label>
          <label>
            Password
            <input id="password" autocomplete="current-password" type="password" />
          </label>
          <p id="login-error" class="error hidden"></p>
          <button id="login" type="submit">Entrar</button>
        </form>
      </section>

      <section id="app-view" class="stack hidden">
        <div class="panel status-row">
          <div class="account">
            <p>Conectado como</p>
            <strong id="account-email">-</strong>
          </div>
          <button id="change-account" class="ghost" type="button">Cambiar</button>
        </div>

        <form id="config-form" class="panel">
          <label>
            Nombre del equipo
            <input id="agentName" autocomplete="off" />
          </label>
          <div class="row">
            <label>
              Grupo
              <select id="groupId">
                <option value="">Cargando grupos...</option>
              </select>
            </label>
            <button id="load-groups" class="secondary" type="button">Actualizar</button>
          </div>
          <div class="row">
            <label>
              Chatlog
              <input id="chatlogPath" placeholder="Automatico si lo dejas vacio" />
            </label>
            <button id="pick-chatlog" class="secondary" type="button">Buscar</button>
          </div>
          <p id="path" class="path">Buscando chatlog...</p>
          <div class="actions">
            <button id="start" type="button">Iniciar</button>
            <button id="stop" class="danger" type="button">Parar</button>
          </div>
        </form>

        <section id="log"></section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
