name: Build Transportista Agent

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Firebase secrets
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
        run: |
          if (-not $env:NEXT_PUBLIC_FIREBASE_API_KEY) {
            throw "Missing secret NEXT_PUBLIC_FIREBASE_API_KEY"
          }
          if (-not $env:NEXT_PUBLIC_FIREBASE_DATABASE_URL) {
            throw "Missing secret NEXT_PUBLIC_FIREBASE_DATABASE_URL"
          }

      - name: Build Transportista Agent
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
        run: bun run transportista:desktop:build

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Transportista-Agent
          path: dist/Transportista-Agent.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Última versión
          body: Transportista Agent compilado automáticamente desde master.
          artifacts: dist/Transportista-Agent.exe
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
